services:
  esrs-server:
    build:
      context: .
      dockerfile: Dockerfile-server
    ports:
      - 4096:4096
    volumes:
      - ./.certs:/app/.certs:ro  # Supports TLS_CERT_FILE=.certs/cert.pem and TLS_KEY_FILE=.certs/key.pem
    env_file:
      - .env
    environment:
      - MCP_SERVER_URL=https://esrs-server-mcp:4200/mcp  # Use http:// if TLS_ENABLED=false
  esrs-worker:
    build:
      context: .
      dockerfile: Dockerfile-worker
    env_file:
      - .env
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
  esrs-server-mcp:
    build:
      context: .
      dockerfile: Dockerfile-server-mcp
    ports:
      - 4200:4200
    volumes:
      - ./.certs:/app/.certs:ro  # Supports TLS_CERT_FILE=.certs/cert.pem and TLS_KEY_FILE=.certs/key.pem
    env_file:
      - .env
  esrs-proxy-mcp:
    build:
      context: .
      dockerfile: Dockerfile-server-mcp
      network: host
    command: ["python", "-m", "server.fastmcp_proxy"]
    stdin_open: true
    tty: true
    environment:
      - FASTMCP_DEBUG=true
    env_file:
      - .env
    network_mode: host