services:
  esrs-server:
    build:
      context: .
      dockerfile: Dockerfile-server
    ports:
      - 4096:4096
    volumes:
      - ./certs:/certs:ro  # For TLS: add cert.pem and key.pem, set TLS_CERT_FILE=/certs/cert.pem TLS_KEY_FILE=/certs/key.pem TLS_ENABLED=true
    env_file:
      - .env
    environment:
      - MCP_SERVER_URL=http://esrs-server-mcp:4200/mcp
      - TLS_ENABLED=false  # Set true with valid certs in ./certs for HTTPS
  esrs-worker:
    build:
      context: .
      dockerfile: Dockerfile-worker
    env_file:
      - .env
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
  esrs-server-mcp:
    build:
      context: .
      dockerfile: Dockerfile-server-mcp
    ports:
      - 4200:4200
    volumes:
      - ./certs:/certs:ro  # For TLS: add cert.pem and key.pem, set TLS_CERT_FILE=/certs/cert.pem TLS_KEY_FILE=/certs/key.pem TLS_ENABLED=true
    env_file:
      - .env
    environment:
      - TLS_ENABLED=false  # Set true with valid certs in ./certs for HTTPS
  esrs-proxy-mcp:
    build:
      context: .
      dockerfile: Dockerfile-server-mcp
      network: host
    command: ["python", "-m", "server.fastmcp_proxy"]
    stdin_open: true
    tty: true
    environment:
      - FASTMCP_DEBUG=true
    env_file:
      - .env
    network_mode: host